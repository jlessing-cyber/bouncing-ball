<!DOCTYPE html>
<html>
<head>
  <title>Bouncing Balls with Energy Graph</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: sans-serif;
    }
    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 8px;
      z-index: 10;
    }
    label { display: block; margin-top: 6px; }
    canvas { display: block; }
  </style>
</head>
<body>

  <div id="controls">
    <label>Gravity: <input type="range" id="gravity" min="0" max="20" step="0.1" value="9.8"></label>
    <label>Elasticity: <input type="range" id="elasticity" min="0" max="1" step="0.01" value="1.0"></label>
    <label>Time Step dt: <input type="range" id="dt" min="0.001" max="0.05" step="0.001" value="0.01"></label>
  </div>

  <!-- Main simulation canvas -->
  <canvas id="simCanvas"></canvas>

  <!-- Energy graph canvas -->
  <canvas id="graphCanvas" height="200"></canvas>

  <!-- Load the script ONCE, and only after the canvas exists -->
  <script src="simulation.js"></script>

</body>
</html>
